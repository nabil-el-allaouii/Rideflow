<main class="register-page">
  <section class="form-column">
    <app-register-form
      [loading]="(isLoading$ | async) ?? false"
      [error]="error$ | async"
      (registerSubmit)="onRegisterSubmit($event)"
    />
  </section>

  <div class="brand-column">
    <app-brand-panel
      titleLight="Join"
      titleAccent="RideFlow"
      subtitle="Start riding smarter. Eco-friendly, affordable, and always nearby."
    />
  </div>
</main>
