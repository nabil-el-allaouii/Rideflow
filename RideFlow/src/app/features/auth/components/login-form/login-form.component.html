<section class="login-form-shell">
  <header>
    <h2>Welcome back</h2>
    <p>Sign in to your account to continue</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <app-text-field
      label="Email"
      type="email"
      autocomplete="email"
      placeholder="you@example.com"
      [control]="form.controls.email"
      [errorMessage]="emailError"
      icon="email"
    />

    <div class="password-row">
      <span class="password-label">Password</span>
      <button type="button" class="inline-link">Forgot password?</button>
    </div>

    <app-text-field
      label=""
      type="password"
      autocomplete="current-password"
      placeholder="Enter your password"
      [control]="form.controls.password"
      [errorMessage]="passwordError"
      ariaLabel="Password"
      icon="lock"
    />

    @if (error) {
      <p class="form-error">{{ error }}</p>
    }

    <button class="submit-button" type="submit" [disabled]="loading">
      @if (loading) {
        <span class="submit-label">Signing in...</span>
      } @else {
        <span class="submit-label">Sign In</span>
        <span class="submit-arrow" aria-hidden="true">
          <svg class="submit-icon" viewBox="0 0 24 24">
            <path d="M6 12h12" />
            <path d="m13 7 5 5-5 5" />
          </svg>
        </span>
      }
    </button>

    <p class="sign-up">
      Don't have an account?
      <a class="inline-link" routerLink="/auth/register">Sign up</a>
    </p>
  </form>
</section>
