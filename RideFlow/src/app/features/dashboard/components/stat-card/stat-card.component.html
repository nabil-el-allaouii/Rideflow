<article class="stat-card">
  <div class="stat-icon" aria-hidden="true">
    @switch (metric.icon) {
      @case ('rides') {
        <svg viewBox="0 0 24 24">
          <circle cx="6" cy="17" r="2.1" />
          <circle cx="17.5" cy="17" r="2.1" />
          <path d="M8.2 17H12l3.8-6.2h-4.3l-1.4-3.2H8.3" />
          <path d="M12 10.8 9.6 13.2" />
        </svg>
      }
      @case ('distance') {
        <svg viewBox="0 0 24 24">
          <path d="M12 20s6-5.7 6-10.1A6 6 0 1 0 6 9.9C6 14.3 12 20 12 20Z" />
          <circle cx="12" cy="10" r="2.1" />
        </svg>
      }
      @case ('time') {
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="8.2" />
          <path d="M12 7.5V12l3.2 1.8" />
        </svg>
      }
      @case ('co2') {
        <svg viewBox="0 0 24 24">
          <path d="m5 15 4-4 3 3 6-6" />
          <path d="M15 8h3v3" />
        </svg>
      }
    }
  </div>

  <div class="stat-copy">
    <h4>{{ metric.value }}</h4>
    <p class="stat-label">{{ metric.label }}</p>
    <p class="stat-helper">{{ metric.helper }}</p>
  </div>
</article>
