spring.application.name=rideflow
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rideflow_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.security.jwt-secret=${JWT_SECRET:rideflow-dev-secret-key-change-me-please-rideflow-dev-secret-key-2026}
app.security.access-token-expiration=PT1H
app.security.refresh-token-expiration=P7D
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:4200}
springdoc.swagger-ui.path=/swagger-ui.html

app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@rideflow.local}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin1234}
app.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:RideFlow Administrator}
app.bootstrap.admin.phone-number=${BOOTSTRAP_ADMIN_PHONE_NUMBER:+212600000000}