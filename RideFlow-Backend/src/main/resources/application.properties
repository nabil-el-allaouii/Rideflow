spring.application.name=rideflow
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/rideflow_db;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

app.security.jwt-secret=${JWT_SECRET}
app.security.access-token-expiration=PT1H
app.security.refresh-token-expiration=P7D
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:4200}
springdoc.swagger-ui.path=/swagger-ui.html

app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@rideflow.local}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin1234}
app.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:RideFlow Administrator}
app.bootstrap.admin.phone-number=${BOOTSTRAP_ADMIN_PHONE_NUMBER:+212600000000}

server.error.include-stacktrace=never