spring.datasource.url=jdbc:h2:mem:rideflow_e2e;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:seed/test-data.sql

app.security.jwt-secret=rideflow-e2e-secret-key-change-me-please-rideflow-e2e-secret-2026
app.security.allowed-origins=http://127.0.0.1:4200,http://localhost:4200

app.bootstrap.admin.enabled=false

app.simulation.payment-success-rate=100
app.simulation.payment-min-delay-ms=25
app.simulation.payment-max-delay-ms=50
