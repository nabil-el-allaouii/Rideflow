spring.application.name=rideflow-test
spring.datasource.url=jdbc:h2:mem:rideflow_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.security.jwt-secret=test-secret-key-test-secret-key-test-secret-key
app.security.access-token-expiration=PT1H
app.security.refresh-token-expiration=P7D
app.security.allowed-origins=http://localhost:4200
app.bootstrap.admin.enabled=false
